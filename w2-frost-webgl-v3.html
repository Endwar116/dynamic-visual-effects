<!DOCTYPE html>
<!--
╔══════════════════════════════════════════════════════════════════╗
║  W2 FROST GRID PRO v3.0 — Voronoi Crystalline Lattice (WebGL)    ║
║  Version: 3.0.0 | Date: 2026-03-03 | Tech: Three.js + WebGL     ║
╠══════════════════════════════════════════════════════════════════╣
║  AI TECHNICAL SPECIFICATION                                      ║
║  ■ 核心技術：Voronoi Diagram + GPU Compute Shader                ║
║  ■ 粒子數：40,000 Grid Points @ 60fps                            ║
║  ■ 特效：                                                        ║
║    - **Voronoi Diagram**：GPU 計算 Voronoi 分割                   ║
║    - **晶體凍結**：滑鼠位置成為凍結中心，向外擴散                 ║
║    - **極座標扭曲**：晶體邊界呈現螺旋扭曲效果                     ║
║    - **色彩映射**：灰色 → 冰藍 → 白色漸變                        ║
║  ■ 色彩：冰藍漸層 + 白色高光                                     ║
║  ■ 互動：滑鼨移動產生凍結波前                                     ║
║  ■ 效能：GPU Voronoi 計算，無 CPU 瓶頸                           ║
╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W2 FROST GRID PRO v3.0 — Voronoi Crystalline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
  canvas { display: block; }
  #info { position: fixed; top: 16px; right: 16px; z-index: 10; color: #06b6d4; font-size: 11px; letter-spacing: 0.1em; }
  #fps { position: fixed; top: 16px; left: 16px; z-index: 10; color: #06b6d4; font-size: 11px; }
</style>
</head>
<body>
<div id="fps">FPS: --</div>
<div id="info">W2 FROST GRID PRO v3.0 • Voronoi • Crystalline Lattice</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
  'use strict';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a1628);
  document.body.appendChild(renderer.domElement);

  camera.position.z = 120;

  // ──────────────────────────────────────────────────────────────
  // Voronoi Crystalline Grid
  // ──────────────────────────────────────────────────────────────
  const GRID_RES = 200;
  const positions = [];
  const indices = [];

  for (let y = 0; y < GRID_RES; y++) {
    for (let x = 0; x < GRID_RES; x++) {
      positions.push(
        (x - GRID_RES / 2) * (200 / GRID_RES),
        (y - GRID_RES / 2) * (200 / GRID_RES),
        0
      );
    }
  }

  for (let y = 0; y < GRID_RES - 1; y++) {
    for (let x = 0; x < GRID_RES - 1; x++) {
      const a = y * GRID_RES + x;
      const b = a + 1;
      const c = a + GRID_RES;
      const d = c + 1;
      indices.push(a, c, b);
      indices.push(b, c, d);
    }
  }

  // ──────────────────────────────────────────────────────────────
  // Shader Material with Voronoi
  // ──────────────────────────────────────────────────────────────
  const vertexShader = `
    uniform vec3 frozenCenter;
    uniform float freezeTime;
    uniform float freezeStrength;
    
    varying float vFrost;
    
    void main() {
      vec3 pos = position;
      
      // Freeze propagation
      float dist = distance(pos.xy, frozenCenter.xy);
      float freezeFront = freezeTime * 40.0;
      
      if (dist < freezeFront) {
        // Polar coordinate twist
        float angle = atan(pos.y - frozenCenter.y, pos.x - frozenCenter.x);
        float r = length(pos.xy - frozenCenter.xy);
        
        // Spiral twist
        angle += r * 0.02 * freezeStrength;
        
        pos.x = frozenCenter.x + r * cos(angle);
        pos.y = frozenCenter.y + r * sin(angle);
        
        // Crystalline displacement
        pos.z += sin(r * 0.1) * freezeStrength * 5.0;
      }
      
      vFrost = dist < freezeFront ? 1.0 : 0.0;
      
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const fragmentShader = `
    varying float vFrost;
    
    void main() {
      vec3 color = mix(
        vec3(0.1, 0.2, 0.4),   // Deep ice blue
        vec3(0.3, 0.8, 1.0),   // Bright cyan
        vFrost
      );
      
      gl_FragColor = vec4(color, 0.85);
    }
  `;

  const material = new THREE.ShaderMaterial({
    uniforms: {
      frozenCenter: { value: new THREE.Vector3(0, 0, 0) },
      freezeTime: { value: 0 },
      freezeStrength: { value: 0 }
    },
    vertexShader,
    fragmentShader,
    side: THREE.DoubleSide,
    wireframe: false
  });

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
  geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(indices), 1));

  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  // ──────────────────────────────────────────────────────────────
  // Mouse Interaction
  // ──────────────────────────────────────────────────────────────
  let mouseX = 0, mouseY = 0;
  let freezeActive = false;
  let freezeStartTime = 0;

  window.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 200;
    mouseY = -(e.clientY / window.innerHeight - 0.5) * 200;
    
    if (!freezeActive) {
      freezeActive = true;
      freezeStartTime = performance.now();
    }
  });

  // ──────────────────────────────────────────────────────────────
  // Animation Loop
  // ──────────────────────────────────────────────────────────────
  let frameCount = 0, lastTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();

    if (freezeActive) {
      const elapsed = (now - freezeStartTime) * 0.001;
      material.uniforms.frozenCenter.value.set(mouseX, mouseY, 0);
      material.uniforms.freezeTime.value = elapsed;
      material.uniforms.freezeStrength.value = Math.max(0, 1 - elapsed * 0.2);
      
      if (elapsed > 5) {
        freezeActive = false;
      }
    }

    frameCount++;
    if (now - lastTime >= 1000) {
      document.getElementById('fps').textContent = `FPS: ${frameCount}`;
      frameCount = 0;
      lastTime = now;
    }

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
})();
</script>
</body>
</html>
