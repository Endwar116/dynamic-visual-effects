║  ■ 粒子數：100,000 @ 60fps                                       ║
║  ■ 特效：                                                        ║

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X1 NEURAL FLOW PRO v3.0 — Perlin Flow Field</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
  canvas { display: block; }
  #info { position: fixed; top: 16px; right: 16px; z-index: 10; color: #fbbf24; font-size: 11px; letter-spacing: 0.1em; }
  #fps { position: fixed; top: 16px; left: 16px; z-index: 10; color: #fbbf24; font-size: 11px; }
</style>
</head>
<body>
<div id="fps">FPS: --</div>
<div id="info">X1 NEURAL FLOW PRO v3.0 • Perlin Flow • 100K Particles</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Simple Perlin noise implementation
const noise = (() => {
  const p = [];
  for (let i = 0; i < 256; i++) p[i] = Math.floor(Math.random() * 256);
  for (let i = 256; i < 512; i++) p[i] = p[i - 256];
  
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (t, a, b) => a + t * (b - a);
  const grad = (hash, x, y) => {
    const h = hash & 15;
    const u = h < 8 ? x : y;
    const v = h < 8 ? y : x;
    return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
  };
  
  return (x, y) => {
    const xi = Math.floor(x) & 255;
    const yi = Math.floor(y) & 255;
    const xf = x - Math.floor(x);
    const yf = y - Math.floor(y);
    const u = fade(xf);
    const v = fade(yf);
    
    const aa = p[p[xi] + yi];
    const ba = p[p[xi + 1] + yi];
    const ab = p[p[xi] + yi + 1];
    const bb = p[p[xi + 1] + yi + 1];
    
    const x1 = lerp(u, grad(aa, xf, yf), grad(ba, xf - 1, yf));
    const x2 = lerp(u, grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1));
    return lerp(v, x1, x2);
  };
})();

(() => {
  'use strict';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0a0f);
  document.body.appendChild(renderer.domElement);

  camera.position.z = 120;

  // ──────────────────────────────────────────────────────────────
  // Flow Field Particle System
  // ──────────────────────────────────────────────────────────────
  const PARTICLE_COUNT = 100000;
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const velocities = new Float32Array(PARTICLE_COUNT * 3);
  const ages = new Float32Array(PARTICLE_COUNT);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 200;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 200;
    positions[i * 3 + 2] = 0;

    velocities[i * 3] = 0;
    velocities[i * 3 + 1] = 0;
    velocities[i * 3 + 2] = 0;

    ages[i] = Math.random();
  }

  // ──────────────────────────────────────────────────────────────
  // Shader Material
  // ──────────────────────────────────────────────────────────────
  const vertexShader = `
    uniform vec3 mousePos;
    uniform float time;
    
    attribute vec3 position;
    attribute vec3 velocity;
    attribute float age;
    
    varying float vSpeed;
    
    void main() {
      vec3 pos = position;
      
      // Flow field advection (simulated with sine/cosine)
      float flowX = sin(pos.y * 0.01 + time * 0.5) * 0.5;
      float flowY = cos(pos.x * 0.01 + time * 0.5) * 0.5;
      
      pos.x += flowX * 0.3;
      pos.y += flowY * 0.3;
      
      // Vortex from mouse
      vec3 toMouse = mousePos - pos;
      float mouseDist = length(toMouse);
      if (mouseDist < 80.0 && mouseDist > 0.1) {
        float angle = atan(toMouse.y, toMouse.x);
        float vortexStrength = (1.0 - mouseDist / 80.0) * 0.5;
        pos.x += sin(angle + 1.57) * vortexStrength;
        pos.y += cos(angle + 1.57) * vortexStrength;
      }
      
      // Wrap around
      if (pos.x < -120.0) pos.x = 120.0;
      if (pos.x > 120.0) pos.x = -120.0;
      if (pos.y < -120.0) pos.y = 120.0;
      if (pos.y > 120.0) pos.y = -120.0;
      
      vSpeed = length(vec3(flowX, flowY, 0.0));
      
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = 1.5;
    }
  `;

  const fragmentShader = `
    varying float vSpeed;
    
    void main() {
      vec2 cxy = 2.0 * gl_PointCoord - 1.0;
      if (length(cxy) > 1.0) discard;
      
      // Heatmap: red -> yellow -> green -> blue
      vec3 color;
      if (vSpeed < 0.25) {
        color = mix(vec3(1.0, 0.0, 0.0), vec3(1.0, 1.0, 0.0), vSpeed * 4.0);
      } else if (vSpeed < 0.5) {
        color = mix(vec3(1.0, 1.0, 0.0), vec3(0.0, 1.0, 0.0), (vSpeed - 0.25) * 4.0);
      } else {
        color = mix(vec3(0.0, 1.0, 0.0), vec3(0.0, 0.5, 1.0), (vSpeed - 0.5) * 2.0);
      }
      
      gl_FragColor = vec4(color, 0.8);
    }
  `;

  const material = new THREE.ShaderMaterial({
    uniforms: {
      mousePos: { value: new THREE.Vector3(0, 0, 0) },
      time: { value: 0 }
    },
    vertexShader,
    fragmentShader,
    transparent: true,
    depthTest: false
  });

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));
  geometry.setAttribute('age', new THREE.BufferAttribute(ages, 1));

  const particles = new THREE.Points(geometry, material);
  scene.add(particles);

  // ──────────────────────────────────────────────────────────────
  // Mouse Interaction
  // ──────────────────────────────────────────────────────────────
  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 200;
    mouseY = -(e.clientY / window.innerHeight - 0.5) * 200;
  });

  // ──────────────────────────────────────────────────────────────
  // Animation Loop
  // ──────────────────────────────────────────────────────────────
  let frameCount = 0, lastTime = performance.now();
  let startTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const deltaTime = (now - startTime) * 0.001;

    material.uniforms.mousePos.value.set(mouseX, mouseY, 0);
    material.uniforms.time.value = deltaTime;

    frameCount++;
    if (now - lastTime >= 1000) {
      document.getElementById('fps').textContent = `FPS: ${frameCount}`;
      frameCount = 0;
      lastTime = now;
    }

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
})();
</script>
</body>
</html>
