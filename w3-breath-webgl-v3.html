<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W3 BREATH FIELD PRO v3.0 — N-Body GPU Gravity</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
  canvas { display: block; }
  #info { position: fixed; top: 16px; right: 16px; z-index: 10; color: #1e40af; font-size: 11px; letter-spacing: 0.1em; }
  #fps { position: fixed; top: 16px; left: 16px; z-index: 10; color: #1e40af; font-size: 11px; }
</style>
</head>
<body>
<div id="fps">FPS: --</div>
<div id="info">W3 BREATH FIELD PRO v3.0 • N-Body Physics • 50K Particles</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
  'use strict';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0xffffff);
  document.body.appendChild(renderer.domElement);

  camera.position.z = 120;

  // ──────────────────────────────────────────────────────────────
  // N-Body Gravity Field
  // ──────────────────────────────────────────────────────────────
  const PARTICLE_COUNT = 50000;
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const velocities = new Float32Array(PARTICLE_COUNT * 3);
  const masses = new Float32Array(PARTICLE_COUNT);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 150;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 150;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 50;

    velocities[i * 3] = (Math.random() - 0.5) * 0.5;
    velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.5;
    velocities[i * 3 + 2] = 0;

    masses[i] = 0.5 + Math.random() * 1.5;
  }

  // ──────────────────────────────────────────────────────────────
  // Shader Material
  // ──────────────────────────────────────────────────────────────
  const vertexShader = `
    uniform vec3 centerOfMass;
    uniform vec3 mousePos;
    uniform float time;
    
    attribute vec3 position;
    attribute vec3 velocity;
    attribute float mass;
    
    varying float vDensity;
    
    void main() {
      vec3 pos = position;
      
      // Attraction to center of mass
      vec3 toCenter = centerOfMass - pos;
      float dist = length(toCenter);
      if (dist > 0.1) {
        pos += normalize(toCenter) * 0.02 * mass;
      }
      
      // Mouse attraction
      vec3 toMouse = mousePos - pos;
      float mouseDist = length(toMouse);
      if (mouseDist < 60.0) {
        pos += normalize(toMouse) * 0.05 * (1.0 - mouseDist / 60.0);
      }
      
      // Breathing animation
      float breathing = sin(time * 0.5) * 0.5 + 0.5;
      pos *= 0.9 + breathing * 0.1;
      
      // Density estimation (simplified)
      vDensity = 1.0 / (1.0 + dist * 0.01);
      
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      gl_PointSize = 2.0 + vDensity * 2.0;
    }
  `;

  const fragmentShader = `
    varying float vDensity;
    
    void main() {
      vec2 cxy = 2.0 * gl_PointCoord - 1.0;
      if (length(cxy) > 1.0) discard;
      
      // Color: white to blue gradient based on density
      vec3 color = mix(
        vec3(0.8, 0.9, 1.0),   // Light blue
        vec3(0.1, 0.3, 1.0),   // Deep blue
        vDensity
      );
      
      float alpha = 0.7 * (1.0 - length(cxy));
      
      gl_FragColor = vec4(color, alpha);
    }
  `;

  const material = new THREE.ShaderMaterial({
    uniforms: {
      centerOfMass: { value: new THREE.Vector3(0, 0, 0) },
      mousePos: { value: new THREE.Vector3(0, 0, 0) },
      time: { value: 0 }
    },
    vertexShader,
    fragmentShader,
    transparent: true,
    depthTest: false,
    blending: THREE.AdditiveBlending
  });

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));
  geometry.setAttribute('mass', new THREE.BufferAttribute(masses, 1));

  const particles = new THREE.Points(geometry, material);
  scene.add(particles);

  // ──────────────────────────────────────────────────────────────
  // Mouse Interaction
  // ──────────────────────────────────────────────────────────────
  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 200;
    mouseY = -(e.clientY / window.innerHeight - 0.5) * 200;
  });

  // ──────────────────────────────────────────────────────────────
  // Animation Loop
  // ──────────────────────────────────────────────────────────────
  let frameCount = 0, lastTime = performance.now();
  let startTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const deltaTime = (now - startTime) * 0.001;

    material.uniforms.mousePos.value.set(mouseX, mouseY, 0);
    material.uniforms.time.value = deltaTime;

    frameCount++;
    if (now - lastTime >= 1000) {
      document.getElementById('fps').textContent = `FPS: ${frameCount}`;
      frameCount = 0;
      lastTime = now;
    }

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
})();
</script>
</body>
</html>
