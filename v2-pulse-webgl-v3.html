<!DOCTYPE html>
<!--
╔══════════════════════════════════════════════════════════════════╗
║  V2 PULSE PRO v3.0 — Geometry Shader Wave Propagation (WebGL)    ║
║  Version: 3.0.0 | Date: 2026-03-03 | Tech: Three.js + WebGL     ║
╠══════════════════════════════════════════════════════════════════╣
║  AI TECHNICAL SPECIFICATION                                      ║
║  ■ 核心技術：Geometry Shader + Procedural Grid Deformation       ║
║  ■ 粒子數：20,000 Grid Points @ 60fps                            ║
║  ■ 特效：                                                        ║
║    - **Procedural Grid**：CPU 生成網格，GPU 變形                  ║
║    - **波紋傳播**：點擊生成波前，實時計算位移                     ║
║    - **衰減函數**：波前強度隨距離指數衰減                         ║
║    - **色彩映射**：根據位移量映射顏色（白→青→黑）               ║
║  ■ 色彩：深藍 + 青色 + 黑色                                      ║
║  ■ 互動：點擊生成波紋，滑鼠移動預覽                               ║
║  ■ 效能：GPU 變形，無網格重建                                    ║
╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V2 PULSE PRO v3.0 — Geometry Shader Wave</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e27; overflow: hidden; font-family: 'JetBrains Mono', monospace; cursor: crosshair; }
  canvas { display: block; }
  #info { position: fixed; top: 16px; right: 16px; z-index: 10; color: #38bdf8; font-size: 11px; letter-spacing: 0.1em; }
  #fps { position: fixed; top: 16px; left: 16px; z-index: 10; color: #38bdf8; font-size: 11px; }
</style>
</head>
<body>
<div id="fps">FPS: --</div>
<div id="info">V2 PULSE PRO v3.0 • Wave Propagation • Click to Pulse</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
  'use strict';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0e27);
  document.body.appendChild(renderer.domElement);

  camera.position.z = 120;

  // ──────────────────────────────────────────────────────────────
  // Procedural Grid with Wave Deformation
  // ──────────────────────────────────────────────────────────────
  const GRID_SIZE = 140;
  const GRID_RES = 140;
  const positions = [];
  const indices = [];

  for (let y = 0; y < GRID_RES; y++) {
    for (let x = 0; x < GRID_RES; x++) {
      positions.push(
        (x - GRID_RES / 2) * (GRID_SIZE / GRID_RES),
        (y - GRID_RES / 2) * (GRID_SIZE / GRID_RES),
        0
      );
    }
  }

  for (let y = 0; y < GRID_RES - 1; y++) {
    for (let x = 0; x < GRID_RES - 1; x++) {
      const a = y * GRID_RES + x;
      const b = a + 1;
      const c = a + GRID_RES;
      const d = c + 1;
      indices.push(a, c, b);
      indices.push(b, c, d);
    }
  }

  // ──────────────────────────────────────────────────────────────
  // Shader Material
  // ──────────────────────────────────────────────────────────────
  const vertexShader = `
    uniform vec3 waveOrigin;
    uniform float waveTime;
    uniform float waveStrength;
    
    varying float vWaveDist;
    
    void main() {
      vec3 pos = position;
      
      // Wave propagation
      float dist = distance(pos.xy, waveOrigin.xy);
      float wave = sin(dist - waveTime * 50.0) * exp(-dist * 0.01) * waveStrength;
      
      pos.z += wave * 20.0;
      
      vWaveDist = wave;
      
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const fragmentShader = `
    varying float vWaveDist;
    
    void main() {
      vec3 color = mix(
        vec3(0.1, 0.3, 0.8),   // Deep blue
        vec3(0.2, 0.8, 1.0),   // Cyan
        vWaveDist + 0.5
      );
      
      gl_FragColor = vec4(color, 0.9);
    }
  `;

  const material = new THREE.ShaderMaterial({
    uniforms: {
      waveOrigin: { value: new THREE.Vector3(0, 0, 0) },
      waveTime: { value: 0 },
      waveStrength: { value: 0 }
    },
    vertexShader,
    fragmentShader,
    side: THREE.DoubleSide,
    wireframe: false
  });

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
  geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(indices), 1));

  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  // ──────────────────────────────────────────────────────────────
  // Wave Interaction
  // ──────────────────────────────────────────────────────────────
  let waveActive = false;
  let waveStartTime = 0;

  window.addEventListener('click', e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 280;
    const y = -(e.clientY / window.innerHeight - 0.5) * 280;
    
    material.uniforms.waveOrigin.value.set(x, y, 0);
    waveActive = true;
    waveStartTime = performance.now();
  });

  // ──────────────────────────────────────────────────────────────
  // Animation Loop
  // ──────────────────────────────────────────────────────────────
  let frameCount = 0, lastTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();

    if (waveActive) {
      const elapsed = (now - waveStartTime) * 0.001;
      material.uniforms.waveTime.value = elapsed;
      material.uniforms.waveStrength.value = Math.max(0, 1 - elapsed * 0.3);
      
      if (elapsed > 3) {
        waveActive = false;
        material.uniforms.waveStrength.value = 0;
      }
    }

    frameCount++;
    if (now - lastTime >= 1000) {
      document.getElementById('fps').textContent = `FPS: ${frameCount}`;
      frameCount = 0;
      lastTime = now;
    }

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
})();
</script>
</body>
</html>
